# Stack local: API de predição + MLflow server + MinIO (artifact store S3)
#
#   docker compose up --build
#
#   API:        http://localhost:5001/docs
#   MLflow UI:  http://localhost:5000
#   MinIO UI:   http://localhost:9101  (minioadmin / minioadmin)
#
# Prometheus e Grafana entram na Fase 5, junto com a instrumentação /metrics.

services:
  api:
    build: .
    ports:
      - "5001:5001"
    environment:
      # Dentro da rede do compose, o registry é o serviço mlflow.
      # Se indisponível, a API usa o fallback local (models/model.keras).
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 60s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      minio-setup:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      # Portas externas 9100/9101 (faixa 9000-9009 costuma estar em uso);
      # dentro da rede do compose continua minio:9000
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cria o bucket de artefatos uma única vez
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mlflow-artifacts
      "

volumes:
  mlflow-data:
  minio-data:
