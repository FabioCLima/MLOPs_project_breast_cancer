train:
  learning_rate: 0.001
  hidden_layer_1_neurons: 64
  hidden_layer_2_neurons: 32
  dropout_rate: 0.3
  epochs: 100
  batch_size: 32
  random_seed: 42

preprocess_data:
  test_size: 0.2
  val_size: 0.2
  random_seed: 42

baselines:
  random_seed: 42
  cv_folds: 5
  logistic_regression:
    C: 1.0
    max_iter: 1000
  random_forest:
    n_estimators: 300
    max_depth: null

evaluate:
  # Gate de promocao: recall minimo da classe maligna para o modelo
  # receber o alias "production" no registry (falso negativo e o erro
  # mais caro no contexto clinico)
  min_malignant_recall: 0.95
